<!DOCTYPE html>
<html>
<head>
    <title>NPV Calculator</title>

    <link href='https://fonts.googleapis.com/css?family=Gotu' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">

</head>

<body>
<h1>NPV Calculator</h1>

<div class="top-inputs">

    <div class="input-group">
        <label>Total Budget:</label>
        <input type="number" id="totalBudget" value="1">
    </div>
    <div class="input-group">
        <label>Number of Years:</label>
        <input type="number" id="years" value="1">
    </div>

    <div class="input-group">
        <label>Number of Topics:</label>
        <input type="number" id="topics" value="1">
    </div>

    <div class="input-group">
        <label>Interest Rate (%):</label>
        <input type="number" id="rate" value="10">
    </div>

    <div class="input-group">
        <label>Confidence Rate (%):</label>
        <input type="number" id="confidenceRate" value="5">
    </div>

</div>



<button onclick="createTable()">Create Table</button>

<div id="tableArea"></div>

<br>

<button id="npvButton" onclick="calculateNPV()" style="display: none;">Calculate NPV</button>

<h3 id="result"></h3>

<script src="script.js"></script>

</body>
</html>
