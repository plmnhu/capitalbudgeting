<!DOCTYPE html>
<html>

<head>
    <title>NPV Calculator</title>

    <link href='https://fonts.googleapis.com/css?family=Gotu' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <h1>NPV Calculator</h1>

    <div class="top-inputs">

        <div class="input-group">
            <label>Total Budget:</label>
            <input type="number" min="1" id="totalBudget" value="1000">
        </div>
        <div class="input-group">
            <label>Number of Years:</label>
            <input type="number" min="1" id="years" value="1">
        </div>

        <div class="input-group">
            <label>Number of Topics:</label>
            <input type="number" min="1" id="topics" value="1">
        </div>

        <div class="input-group">
            <label>Interest Rate (%):</label>
            <input type="number" min="0" max="100" id="rate" value="10">
        </div>

        <div class="input-group">
            <label>Confidence Rate (%):</label>
            <input type="number" min="0" max="100" id="confidenceRate" value="95">
        </div>

    </div>



    <button onclick="createTable()">Create Table</button>

    <div id="tableArea"></div>

    <br>

    <button id="npvButton" onclick="calculateNPV()" style="display: none;">Calculate NPV</button>
    <h3 id="npvResult"></h3>
     <button id="chooseButton" onclick="choosingProject()" style="display: none;">Choose Best Combination</button>
     <h3 id="projectResult"></h3>
    <script src="script.js"></script>

</body>

</html>
